<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'db')}">
<body>

<div class="container">
    <h1>Database Records</h1>
    <ul th:each="record : ${records}">
        <li th:text="${record}"/>
    </ul>
    <a href="/dbinput" class="btn btn-default">Add New Entry</a>
</div>

</body>
</html>
